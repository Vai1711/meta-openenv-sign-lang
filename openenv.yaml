name: sign_language_interpreter
version: 1.0.0
description: |
  A multi-modal Sign Language Interpreter environment that translates 
  American Sign Language (ASL) gestures into English text using hand 
  descriptions, facial expressions, and audio hints.
entry_point: env:SignInterpreterEnv

# The Grader requires at least 3 tasks. We use IDs 0, 1, and 2 
# to map to Easy, Medium, and Hard in your env.py logic.
tasks:
  - id: 0
    name: "sign-translation-easy"
    difficulty: "easy"
  - id: 1
    name: "sign-translation-medium"
    difficulty: "medium"
  - id: 2
    name: "sign-translation-hard"
    difficulty: "hard"

environment:
  max_steps: 10
  memory_limit: "8GB"
  seed: 42

# Defines the data structure for the LLM agent and grader checks
agent_interface:
  observation_space:
    type: "structured"
    fields:
      hand_description: 
        type: "string"
      facial_expression: 
        type: "string"
        optional: true
      audio_hint: 
        type: "string"
        optional: true
      sequence_length: 
        type: "integer"
      current_position: 
        type: "integer"
      difficulty: 
        type: "string"
      previous_signs: 
        type: "array"
        items: "string"
  action_space:
    type: "structured"
    fields:
      action_type: 
        type: "string"
      translation: 
        type: "string"
        optional: true

# Metrics required for the internal evaluation logic
evaluation_metrics:
  - name: "translation_accuracy"
    description: "Percentage of correct translations"
    calculation: "correct_translations / total_attempts"
  - name: "episode_reward"
    description: "Average reward per episode"
    calculation: "total_reward / total_episodes"

name: sign_language_interpreter
version: 1.0.0
entry_point: env:SignInterpreterEnv

tasks:
  - id: 0
    name: "sign-translation-easy"
    description: "Translate a single ASL sign."
    grader: "translation_accuracy"
    evaluation:
      type: "translation_accuracy"
      target_accuracy: 0.8
      max_episodes: 20
      max_steps_per_episode: 5
  - id: 1
    name: "sign-translation-medium"
    description: "Translate a 3-word ASL sequence."
    grader: "sequence_translation_accuracy"
    evaluation:
      type: "sequence_translation_accuracy"
      target_accuracy: 0.7
      max_episodes: 20
      max_steps_per_episode: 10
  - id: 2
    name: "sign-translation-hard"
    description: "Disambiguate Visual Twins using audio/context hints."
    grader: "contextual_translation_accuracy"
    evaluation:
      type: "contextual_translation_accuracy"
      target_accuracy: 0.6
      max_episodes: 10
      max_steps_per_episode: 10

agent_interface:
  observation_space:
    type: "structured"
    fields:
      hand_description: {type: "string"}
      facial_expression: {type: "string", optional: true}
      audio_hint: {type: "string", optional: true}
      context_clue: {type: "string", optional: true}
      difficulty: {type: "string"}
  action_space:
    type: "structured"
    fields:
      action_type: {type: "enum", values: ["query_dict", "query_context", "submit_translation"]}
      translation: {type: "string", optional: true}
